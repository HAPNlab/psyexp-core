name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # The tested surface (manifest, recording, diagnostics, rundir) is
      # PsychoPy-free, so we skip the heavy GL/PsychoPy stack and install the
      # project without its runtime deps plus the dev tooling only. pydantic is
      # the one runtime dep this surface imports at module load (manifest_models),
      # so it's installed explicitly here rather than via the full dep tree.
      - name: Install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install --no-deps -e .
          uv pip install pytest ruff pydantic

      # Use --no-sync so `uv run` does not re-resolve and install the full
      # dependency tree (which includes PsychoPy/wxPython and fails to build on
      # CI). We rely on the no-deps venv set up above instead.
      - name: Lint
        run: uv run --no-sync ruff check .

      - name: Test
        run: uv run --no-sync pytest
